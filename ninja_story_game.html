<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#101326" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Shadow Oath - PWA</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <style>
    :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
    html, body { margin: 0; height: 100%; background: #080a12; color: #fff; font-family: Arial, sans-serif; overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent; }
    #app { position: fixed; inset: 0; }
    #ui {
      position: fixed; left: 0; right: 0; top: 0; z-index: 10;
      padding: calc(8px + var(--safe-top)) 10px 0;
      display: flex; justify-content: space-between; gap: 8px;
      pointer-events: none; font-weight: 700; text-shadow: 0 2px 2px #000; font-size: 14px;
    }
    #restart-top {
      pointer-events: auto;
      border: 1px solid #ffffff66;
      background: #000a;
      color: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      font-weight: 700;
      touch-action: none;
      display: none;
    }
    #msg {
      position: fixed; left: 50%; top: calc(8% + var(--safe-top)); transform: translateX(-50%);
      background: #000b; padding: 10px 14px; border: 1px solid #fff4; max-width: min(760px, 92vw); text-align: center; z-index: 8;
    }
    #game-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    canvas {
      display: block; background: #101326; image-rendering: pixelated;
      width: min(100vw, calc(100dvh * 16 / 9));
      height: min(100dvh, calc(100vw * 9 / 16));
      border-radius: 0;
    }
    #touch-controls {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 11;
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      padding: 8px 10px calc(10px + var(--safe-bottom)); user-select: none;
      background: linear-gradient(to top, #00000088, #00000000);
    }
    .pad, .actions { display: flex; gap: 10px; align-items: flex-end; }
    .pad { justify-content: flex-start; padding-left: 6px; }
    .actions { justify-content: flex-end; flex-wrap: wrap; padding-right: 6px; }
    .btn {
      width: 64px; height: 64px; border-radius: 14px; border: 1px solid #ffffff45;
      background: linear-gradient(#1d2238, #14182b); color: #fff; font-weight: 700; font-size: 13px;
      box-shadow: 0 4px 12px #0008; touch-action: none; cursor: default; outline: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; caret-color: transparent;
    }
    .btn:active, .btn.active { transform: translateY(1px); background: linear-gradient(#2b3352, #1b2240); }
    .btn:focus, .btn:focus-visible { outline: none; box-shadow: 0 4px 12px #0008; }
    .btn-wide { width: 76px; }
    @media (min-width: 900px) {
      #touch-controls { max-width: 980px; margin: 0 auto; width: calc(100% - 20px); }
      .btn { width: 58px; height: 58px; }
    }
    @media (max-height: 700px) {
      .btn { width: 54px; height: 54px; border-radius: 12px; }
      #ui { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui"><div id="stats"></div><div id="chapter"></div><button id="restart-top" type="button">Restart</button></div>
    <div id="game-wrap"><canvas id="game" width="960" height="540"></canvas></div>
    <div id="touch-controls">
      <div class="pad">
        <button class="btn" data-key="arrowleft">◀</button>
        <button class="btn" data-key="arrowright">▶</button>
      </div>
      <div class="actions">
        <button class="btn btn-wide" data-key=" ">JUMP</button>
        <button class="btn btn-wide" data-key="j">FIGHT</button>
      </div>
    </div>
  </div>
  <div id="msg"></div>
  <script>
    const c = document.getElementById("game"), x = c.getContext("2d");
    x.imageSmoothingEnabled = false;
    const stats = document.getElementById("stats"), chapterUI = document.getElementById("chapter"), msg = document.getElementById("msg");
    const restartTop = document.getElementById("restart-top");
    const keys = {};
    const blockKeys = new Set(["arrowleft","arrowright","arrowup","arrowdown"," ","w","a","d","j","shift","enter","r"]);

    addEventListener("keydown", e => {
      const k = e.key.toLowerCase();
      if (blockKeys.has(k)) e.preventDefault();
      keys[k] = true;
    }, { passive: false });
    addEventListener("keyup", e => {
      const k = e.key.toLowerCase();
      if (blockKeys.has(k)) e.preventDefault();
      keys[k] = false;
    }, { passive: false });
    restartTop.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      location.reload();
    }, { passive: false });
    let touchStartRequested = false;
    addEventListener("pointerdown", () => { touchStartRequested = true; }, { passive: true });

    for (const btn of document.querySelectorAll("[data-key]")) {
      const key = btn.getAttribute("data-key");
      const down = (e) => { e.preventDefault(); keys[key] = true; startAudioOnce(); btn.classList.add("active"); };
      const up = (e) => { e.preventDefault(); keys[key] = false; btn.classList.remove("active"); btn.blur(); };
      btn.addEventListener("pointerdown", down, { passive: false });
      btn.addEventListener("pointerup", up, { passive: false });
      btn.addEventListener("pointercancel", up, { passive: false });
      btn.addEventListener("pointerleave", up, { passive: false });
    }

    const assetPath = "./ninja-assets";
    const images = { hero: new Image(), enemy: new Image(), boss: new Image(), tiles: new Image() };
    images.hero.src = `${assetPath}/characters/hero.png`;
    images.enemy.src = `${assetPath}/monsters/enemy1.png`;
    images.boss.src = `${assetPath}/monsters/enemy2.png`;
    images.tiles.src = `${assetPath}/background/tileset.png`;

    const oggSupported = !!document.createElement("audio").canPlayType("audio/ogg; codecs=vorbis");
    const audio = {
      theme: oggSupported ? new Audio(`${assetPath}/music/theme.ogg`) : null,
      hit: oggSupported ? new Audio(`${assetPath}/sounds/hit.ogg`) : null
    };
    if (audio.theme) { audio.theme.loop = true; audio.theme.volume = 0.22; }
    if (audio.hit) { audio.hit.volume = 0.35; }
    let audioCtx = null;
    let proceduralThemeStarted = false;

    const levels = [
      {name:"Chapter 1: Burning Village", sky:["#2a1220","#101326"], story:"Your clan lies in ashes. Hunt the betrayer.", endX:1900, enemies:[{x:540},{x:860},{x:1310}]},
      {name:"Chapter 2: Moonlit Forest", sky:["#1a2438","#0e1320"], story:"The traitor flees into the forest mist.", endX:2250, enemies:[{x:600},{x:970},{x:1320},{x:1750}]},
      {name:"Chapter 3: Fortress Duel", sky:["#2f1d13","#100a12"], story:"Face the warlord and reclaim your oath.", endX:2600, enemies:[{x:760,hp:9,boss:true},{x:1170},{x:1640},{x:2120}]}
    ];

    const player = {x:80,y:370,w:48,h:64,vx:0,vy:0,dir:1,hp:100,maxHp:100,energy:100,atkTimer:0,dashCd:0,onGround:false,inv:0,level:0,anim:0,jumpCount:0,jumpLatch:false};
    let camX = 0, state = "boot", storyTimer = 0, over = false, victory = false, shake = 0, startedAudio = false;
    let enemies = [], particles = [];

    function startAudioOnce(){
      if(startedAudio) return;
      startedAudio = true;
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
      }
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume().catch(() => {});
      if (audio.theme) audio.theme.play().catch(()=>{});
      else startProceduralTheme();
    }
    addEventListener("keydown", startAudioOnce, {once:true});
    addEventListener("pointerdown", startAudioOnce, {once:true});

    function allAssetsReady(){ return Object.values(images).every(img => img.complete && img.naturalWidth > 0); }
    function startProceduralTheme(){
      if (proceduralThemeStarted || !audioCtx) return;
      proceduralThemeStarted = true;
      const gain = audioCtx.createGain();
      gain.gain.value = 0.025;
      gain.connect(audioCtx.destination);
      const o1 = audioCtx.createOscillator();
      const o2 = audioCtx.createOscillator();
      o1.type = "triangle"; o2.type = "sine";
      o1.frequency.value = 110; o2.frequency.value = 165;
      o1.connect(gain); o2.connect(gain);
      o1.start(); o2.start();
    }
    function playHitSound(){
      if (audio.hit) {
        const s = audio.hit.cloneNode();
        s.volume = 0.25;
        s.play().catch(()=>{});
        return;
      }
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(320, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.08);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.09);
    }
    function emit(x0,y0,color,count,speed=2.5){
      for(let i=0;i<count;i++){ const a=Math.random()*Math.PI*2, s=Math.random()*speed; particles.push({x:x0,y:y0,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.4,life:22+Math.random()*18,color,size:2+Math.random()*4}); }
    }

    function loadLevel(i){
      player.level = i; player.x = 80; player.y = 370; player.vx = 0; player.vy = 0; player.energy = Math.min(100, player.energy + 35); player.atkTimer = 0; player.jumpCount = 0;
      enemies = levels[i].enemies.map((e,idx)=>({x:e.x,y:398,w:42,h:52,vx:(idx%2?1:-1)*(e.boss?0.8:1.15),hp:e.hp||4,maxHp:e.hp||4,boss:!!e.boss,hit:0,frame:0,dir:1}));
      state = "story"; storyTimer = 190; particles.length = 0;
    }

    function rectHit(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
    function press(k){ return keys[k] || false; }

    function update(){
      if(!allAssetsReady()) return;
      if(state === "boot"){ msg.innerHTML = "<span style='display:block;color:#ff3b3b;font-size:30px;font-weight:800;line-height:1.15;'>Created by Han Thar</span><span style='display:block;height:14px;'></span><span style='display:block;'>Tap screen or press Enter to begin.</span>"; msg.style.whiteSpace = "normal"; msg.style.display = "block"; if(press("enter") || touchStartRequested){ touchStartRequested = false; loadLevel(0); } return; }
      if(over || victory){ if(press("r") || press("enter") || touchStartRequested){ touchStartRequested = false; location.reload(); } return; }
      if(state === "story"){ state = "play"; }

      const moving = press("a") || press("d") || press("arrowleft") || press("arrowright");
      if(press("a") || press("arrowleft")) { player.vx = -3.4; player.dir = -1; }
      else if(press("d") || press("arrowright")) { player.vx = 3.4; player.dir = 1; }
      else player.vx *= 0.74;

      if((press("w") || press("arrowup") || press(" ")) && !player.jumpLatch){
        player.jumpLatch = true;
        if(player.onGround || player.jumpCount < 2){ player.vy = -10.3; player.onGround = false; player.jumpCount++; emit(player.x + player.w/2, player.y + player.h, "#e8f0ff", 8, 2); }
      }
      if(!(press("w") || press("arrowup") || press(" "))) player.jumpLatch = false;

      if(press("shift") && player.dashCd <= 0 && player.energy >= 20){
        player.vx = player.dir * 10.5; player.energy -= 20; player.dashCd = 55; player.inv = 10; shake = 5;
        emit(player.x + player.w/2, player.y + player.h/2, "#8cd8ff", 18, 3.8);
      }
      if(press("j") && player.atkTimer <= 0){ player.atkTimer = 16; shake = Math.max(shake, 3); }

      player.dashCd--; player.atkTimer--; player.inv--;
      player.vy += 0.5; player.x += player.vx; player.y += player.vy;
      const ground = 448;
      if(player.y + player.h >= ground){ player.y = ground - player.h; player.vy = 0; player.onGround = true; player.jumpCount = 0; }
      player.energy = Math.min(100, player.energy + 0.12);
      player.x = Math.max(0, player.x);

      const attackBox = {x: player.dir>0 ? player.x+player.w-4 : player.x-36, y: player.y+8, w:36, h:42};
      enemies.forEach(e=>{
        if(e.hp <= 0) return;
        if(e.hit > 0){ e.hit--; return; }
        e.x += e.vx; e.frame += 0.13; e.dir = e.vx >= 0 ? 1 : -1;
        if(Math.random()<0.012 || e.x<120 || e.x>levels[player.level].endX-90) e.vx *= -1;
        if(rectHit(player,e) && player.inv<=0){
          player.hp -= e.boss ? 14 : 8; player.inv = 28; shake = 7; emit(player.x + player.w/2, player.y + player.h/2, "#ff6f6f", 16, 3.2);
          if(player.hp<=0) over = true;
        }
        if(player.atkTimer>0 && rectHit(attackBox,e)){
          e.hp -= e.boss ? 0.7 : 1.25; e.hit = 14; e.vx = player.dir*2.8; shake = 6; emit(e.x + e.w/2, e.y + e.h/2, "#fff4a0", 22, 3.8);
          playHitSound();
        }
      });
      enemies = enemies.filter(e=>e.hp>0);

      particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life--; });
      particles = particles.filter(p=>p.life>0);

      if(player.x > levels[player.level].endX){ if(player.level === levels.length-1) victory = true; else loadLevel(player.level+1); }

      player.anim += (moving && player.onGround) ? 0.2 : 0.1;
      camX = Math.max(0, Math.min(player.x - 250, levels[player.level].endX - c.width + 160));
      shake *= 0.85;
    }

    function drawTile(tx,ty,sx,sy,scale=3){ x.drawImage(images.tiles,sx*16,sy*16,16,16,tx,ty,16*scale,16*scale); }
    function drawGround(){
      const level = levels[player.level];
      for(let gx=-64; gx<level.endX+240; gx+=48){ const rx = gx - camX; drawTile(rx,448,Math.floor((gx/48)%6)+1,19,3); drawTile(rx,496,Math.floor((gx/48)%6)+1,21,3); }
    }
    function drawBackdrop(){
      const [top,bottom] = levels[player.level].sky;
      const g = x.createLinearGradient(0,0,0,c.height); g.addColorStop(0,top); g.addColorStop(1,bottom); x.fillStyle = g; x.fillRect(0,0,c.width,c.height);
      x.fillStyle = "#fff2d7"; x.globalAlpha = 0.17; x.beginPath(); x.arc(790, 95, 52, 0, Math.PI * 2); x.fill(); x.globalAlpha = 1;
      for(let i=0;i<26;i++){ const px = (i*120 - camX*0.28)%3500; x.fillStyle = i%2 ? "#1b2542" : "#172038"; x.fillRect(px,220+(i%4)*22,90,240); }
      for(let i=0;i<14;i++){ const cx = ((i * 300) - camX * 0.16) % 4400; const cy = 70 + (i % 4) * 26; x.fillStyle = "#cfd8ff14"; x.beginPath(); x.ellipse(cx, cy, 44, 15, 0, 0, Math.PI * 2); x.fill(); x.beginPath(); x.ellipse(cx + 28, cy + 2, 36, 12, 0, 0, Math.PI * 2); x.fill(); }
      for(let i=0;i<48;i++){ const tx = ((i*100)-camX*0.48)%5200; const h = 40 + (i%5) * 15; x.fillStyle = i%2 ? "#0f1628" : "#101a30"; x.beginPath(); x.moveTo(tx, 448); x.lineTo(tx + 30, 448 - h); x.lineTo(tx + 60, 448); x.fill(); }
      x.fillStyle = "#151326"; x.fillRect(610 - camX * 0.34, 270, 95, 178); x.fillStyle = "#191835"; x.fillRect(630 - camX * 0.34, 236, 54, 44); x.fillRect(640 - camX * 0.34, 205, 34, 32);
      for(let i=0;i<40;i++){ x.fillStyle = "#ffffff22"; x.fillRect(((i*230)-camX*0.1)%4000,40+(i%6)*40,2,2); }
    }
    function drawSword(px, py, dir, atkTimer){
      const t = Math.max(0, Math.min(1, 1 - (atkTimer / 16))); const swing = dir > 0 ? (-0.9 + t * 1.6) : (0.9 - t * 1.6);
      const baseX = px + (dir > 0 ? 30 : 18), baseY = py + 24;
      x.save(); x.translate(baseX, baseY); x.rotate(swing);
      x.fillStyle = "#3a2b16"; x.fillRect(-4, -1, 10, 5);
      x.fillStyle = "#c7d6ff"; x.fillRect(6, -2, 28, 6);
      x.fillStyle = "#f1f7ff"; x.beginPath(); x.moveTo(34, -2); x.lineTo(42, 1); x.lineTo(34, 4); x.closePath(); x.fill();
      const trail = x.createLinearGradient(0, -10, 44, 10); trail.addColorStop(0, "#9ad6ff22"); trail.addColorStop(1, "#ffffff99");
      x.strokeStyle = trail; x.lineWidth = 8; x.beginPath(); x.arc(8, 1, 24, -0.4, 0.5); x.stroke();
      x.restore();
    }
    function drawEntitySprite(sprite, ent, frameW, frameH, frames, scale){
      const f = Math.floor(ent.frame) % frames, sx = f * frameW, sy = 0, dw = frameW * scale, dh = frameH * scale;
      const px = ent.x - camX + ent.w/2 - dw/2, py = ent.y + ent.h - dh + 4;
      x.save();
      if(ent.dir < 0){ x.translate(px + dw, 0); x.scale(-1,1); x.drawImage(sprite,sx,sy,frameW,frameH,0,py,dw,dh); }
      else x.drawImage(sprite,sx,sy,frameW,frameH,px,py,dw,dh);
      x.restore();
    }

    function draw(){
      const jx = (Math.random()-0.5)*shake, jy = (Math.random()-0.5)*shake;
      x.save(); x.translate(jx,jy); drawBackdrop(); drawGround();
      const level = levels[player.level]; drawTile(level.endX-camX,401,3,8,3);

      enemies.forEach(e=>{ drawEntitySprite(e.boss ? images.boss : images.enemy, e, 16, 16, 4, e.boss ? 3.2 : 3); x.fillStyle = "#000"; x.fillRect(e.x-camX, e.y-11, e.w, 5); x.fillStyle = e.boss ? "#f84" : "#f44"; x.fillRect(e.x-camX, e.y-11, e.w*(e.hp/e.maxHp), 5); });

      const moving = Math.abs(player.vx) > 0.5, row = !player.onGround ? 5 : (player.atkTimer>0 ? 3 : moving ? 1 : 0), frame = Math.floor(player.anim) % 4;
      const sx = frame * 16, sy = row * 16, px = player.x - camX - 10, py = player.y - 2;
      x.save();
      if(player.dir < 0){ x.translate(px + 64, 0); x.scale(-1,1); x.drawImage(images.hero,sx,sy,16,16,0,py,64,64); }
      else x.drawImage(images.hero,sx,sy,16,16,px,py,64,64);
      x.restore();
      if(player.atkTimer > 0) drawSword(px, py, player.dir, player.atkTimer);
      if(player.inv > 0){ x.strokeStyle = "#b7f7ff99"; x.lineWidth = 2; x.strokeRect(player.x-camX-6, player.y-6, player.w+12, player.h+10); }
      const hpPercent = Math.max(0, Math.min(100, (player.hp / player.maxHp) * 100));
      const hpX = player.x - camX + player.w / 2 - 30;
      const hpY = player.y - 16;
      x.fillStyle = "#1a1f33";
      x.fillRect(hpX, hpY, 60, 7);
      x.fillStyle = "#18c933";
      x.fillRect(hpX + 1, hpY + 1, 58 * (hpPercent / 100), 5);
      x.strokeStyle = "#ffffff88";
      x.lineWidth = 1;
      x.strokeRect(hpX, hpY, 60, 7);

      particles.forEach(p=>{ x.globalAlpha = Math.max(0, p.life/36); x.fillStyle = p.color; x.beginPath(); x.arc(p.x-camX,p.y,p.size,0,Math.PI*2); x.fill(); });
      x.globalAlpha = 1; x.restore();

      if(!allAssetsReady()){ msg.textContent = "Loading assets..."; msg.style.display = "block"; }
      else if(state==="boot"){ msg.innerHTML = "<span style='display:block;color:#ff3b3b;font-size:30px;font-weight:800;line-height:1.15;'>Created by Han Thar</span><span style='display:block;height:14px;'></span><span style='display:block;'>Tap screen or press Enter to begin.</span>"; msg.style.whiteSpace = "normal"; msg.style.display = "block"; }
      else if(over){ msg.textContent = "You were defeated. Tap screen to restart."; msg.style.display = "block"; }
      else if(victory){ msg.textContent = "You defeated the warlord. Tap screen to play again."; msg.style.display = "block"; }
      else msg.style.display = "none";
      restartTop.style.display = (over || victory) ? "block" : "none";

      stats.textContent = "";
      chapterUI.textContent = `${level.name} | Mobile + PWA`;
    }

    function loop(){ update(); draw(); requestAnimationFrame(loop); }
    loop();

    if ("serviceWorker" in navigator) {
      addEventListener("load", async () => {
        try {
          const reg = await navigator.serviceWorker.register("./sw.js");
          reg.update();
          if (reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" });
          reg.addEventListener("updatefound", () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener("statechange", () => {
              if (nw.state === "installed" && navigator.serviceWorker.controller) nw.postMessage({ type: "SKIP_WAITING" });
            });
          });
          let refreshed = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (refreshed) return;
            refreshed = true;
            location.reload();
          });
        } catch (_) {}
      });
    }
  </script>
</body>
</html>
